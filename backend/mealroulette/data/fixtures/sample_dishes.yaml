  recipes:
  - variant_name: Classic
    is_main: true
    recipe_type: standard
    servings: 4
    prep_time_minutes: 10
    cook_time_minutes: 30
    difficulty: medium
    description: Stovetop mushroom risotto based on the saved Risotto recipe.
    source_url: 
    notes: Use mixed mushrooms when available.
    steps:
    - step_number: 1
      instruction: Clean and slice the mushrooms, then saute them with minced garlic, butter, parsley, salt, and pepper until tender.
      timer_seconds: 480
    - step_number: 2
      instruction: Warm the vegetable stock in a saucepan and keep it at a gentle simmer.
    - step_number: 3
      instruction: Soften the onion in olive oil, add the arborio rice, and stir for 2 minutes until the grains look slightly translucent.
      timer_seconds: 120
    - step_number: 4
      instruction: Add white wine and let it absorb, then add hot stock one ladle at a time, stirring until the rice is creamy and just tender.
      timer_seconds: 1200
    - step_number: 5
      instruction: Fold in the mushrooms, cream, and parmesan, rest for 2 minutes, then serve hot.
      timer_seconds: 120
    ingredients:
