ingredient_families:
- name: tomato_family
  description: Fresh and preserved tomato products. Related for similarity, not automatically interchangeable for shopping.
- name: onion_family
  description: Onions, shallots, spring onions and similar alliums.
- name: garlic_family
  description: Fresh garlic and garlic-derived products.
- name: pepper_family
  description: Sweet bell peppers and chili peppers.
- name: mushroom_family
  description: Common mushrooms and specialty mushrooms.
- name: rice_family
  description: Different rice types; do not merge because cooking behavior differs.
- name: pasta_family
  description: Dry pasta and fresh/stuffed pasta; cooking and shopping forms differ.
- name: legume_family
  description: Beans, lentils, chickpeas and peas.
- name: dairy_family
  description: Milk, cream, yogurt, butter and cheeses.
- name: cheese_family
  description: Cheeses; related but not generally interchangeable.
- name: citrus_family
  description: Lemon, lime and similar citrus fruits.
- name: herb_family
  description: Fresh herbs; bunch-to-gram conversion is approximate.
- name: stock_family
  description: Vegetable, fish, chicken or meat stocks.
- name: seafood_family
  description: Fish, shellfish, mollusks and seafood products.
- name: bread_pastry_family
  description: Bread, wraps, pastries and dough bases.
- name: potato_family
  description: Potato and sweet potato are related but not interchangeable.
- name: cabbage_family
  description: Cabbage, kale, cauliflower and brassicas.
- name: sauce_condiment_family
  description: Prepared sauces, pastes, condiments and flavor bases.
