name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  POSTGRES_USER: mealroulette
  POSTGRES_PASSWORD: mealroulette
  SECRET_KEY: test-secret-key-that-is-long-enough-for-hs256
  TEST_DATABASE_URL: postgresql+psycopg://mealroulette:mealroulette@localhost:5432/mealroulette_test
  DATABASE_URL: postgresql+psycopg://mealroulette:mealroulette@localhost:5432/mealroulette_test
  ADMIN_DATABASE_URL: postgresql://mealroulette:mealroulette@localhost:5432/postgres

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mealroulette
          POSTGRES_PASSWORD: mealroulette
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mealroulette -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./backend[dev]"

      - name: Create parallel test databases
        run: python backend/scripts/setup_test_databases.py

      - name: Run backend unit tests
        run: |
          cd backend
          pytest -m "not integration" -n auto

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mealroulette
          POSTGRES_PASSWORD: mealroulette
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mealroulette -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./backend[dev]"

      - name: Create parallel test databases
        run: python backend/scripts/setup_test_databases.py

      - name: Run backend integration tests
        run: |
          cd backend
          pytest -m integration -n auto

  frontend-unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --run

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  validate-taxonomy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./backend[dev]"

      - name: Validate taxonomy
        run: make validate-taxonomy
