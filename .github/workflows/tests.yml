name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mealroulette
          POSTGRES_PASSWORD: mealroulette
          POSTGRES_DB: mealroulette_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mealroulette -d mealroulette_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./backend[dev]"

      - name: Run backend tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://mealroulette:mealroulette@localhost:5432/mealroulette_test
          DATABASE_URL: postgresql+psycopg://mealroulette:mealroulette@localhost:5432/mealroulette_test
          SECRET_KEY: test-secret-key-that-is-long-enough-for-hs256
        run: |
          cd backend
          pytest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --run
