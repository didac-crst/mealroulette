services:
  db:
    image: postgres:16
    container_name: mealroulette-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mealroulette}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealroulette}
      POSTGRES_DB: ${POSTGRES_DB:-mealroulette}
    ports:
      - "5432:5432"
    volumes:
      - mealroulette-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/01-init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealroulette} -d ${POSTGRES_DB:-mealroulette}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: mealroulette-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mealroulette}:${POSTGRES_PASSWORD:-mealroulette}@db:5432/${POSTGRES_DB:-mealroulette}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-secret}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - ./backups:/backups

  worker:
    build: ./backend
    container_name: mealroulette-worker
    command: ["python", "-m", "mealroulette.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mealroulette}:${POSTGRES_PASSWORD:-mealroulette}@db:5432/${POSTGRES_DB:-mealroulette}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-secret}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backups:/backups

  frontend:
    build: ./frontend
    container_name: mealroulette-ui
    ports:
      - "3000:3000"
    environment:
      VITE_DEV_PROXY_TARGET: http://api:8000
      VITE_API_URL: ${VITE_API_URL:-}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  mealroulette-postgres-data:
  frontend-node-modules:
