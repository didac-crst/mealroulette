services:
  db:
    image: postgres:16
    container_name: mealroulette-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mealroulette}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealroulette}
      POSTGRES_DB: ${POSTGRES_DB:-mealroulette}
    ports:
      - "5432:5432"
    volumes:
      - mealroulette-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealroulette} -d ${POSTGRES_DB:-mealroulette}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: mealroulette-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mealroulette}:${POSTGRES_PASSWORD:-mealroulette}@db:5432/${POSTGRES_DB:-mealroulette}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups

  worker:
    build: ./backend
    container_name: mealroulette-worker
    command: ["python", "-m", "mealroulette.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mealroulette}:${POSTGRES_PASSWORD:-mealroulette}@db:5432/${POSTGRES_DB:-mealroulette}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./backups:/backups

  frontend:
    build: ./frontend
    container_name: mealroulette-ui
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  mealroulette-postgres-data:
